<style>
    nav { display: none !important; }
    html, body { background: #f7f9fb; overflow-x: hidden; scroll-behavior: smooth; }
    .container { max-width: 100% !important; width: 100% !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important; background: transparent !important; border: none !important; }

    .seo-wrapper { max-width: 820px; margin: 0 auto; padding: 0 20px 80px; position: relative; z-index: 2; }
    .seo-breadcrumbs { padding-top: calc(24px + env(safe-area-inset-top)); margin-bottom: 16px; }
    .seo-breadcrumbs ol { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 4px; font-size: 13px; }
    .seo-breadcrumbs a { color: #2563eb; text-decoration: none; font-weight: 600; }
    .seo-breadcrumbs a:hover { text-decoration: underline; }
    .seo-breadcrumbs .sep { color: #94a3b8; margin: 0 4px; }
    .seo-breadcrumbs span[aria-current] { color: #64748b; font-weight: 600; }

    .seo-hero { text-align: center; padding: 24px 0 40px; }
    .seo-hero .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; background: rgba(37,99,235,0.1); color: #2563eb; font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 16px; }
    .seo-hero h1 { font-size: clamp(28px, 7vw, 44px); font-weight: 800; color: #0f172a; line-height: 1.15; letter-spacing: -0.03em; margin: 0 0 16px; }
    .seo-hero .subtitle { font-size: clamp(15px, 4vw, 18px); color: #475569; line-height: 1.6; max-width: 640px; margin: 0 auto 28px; font-weight: 500; }
    .seo-hero .cta-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .seo-btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 24px; border-radius: 100px; font-size: 14px; font-weight: 700; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
    .seo-btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; box-shadow: 0 10px 24px rgba(37,99,235,0.25); }
    .seo-btn-primary:hover { transform: translateY(-2px); }
    .seo-btn-glass { background: rgba(255,255,255,0.8); color: #1e293b; border: 1px solid rgba(0,0,0,0.06); }

    .seo-content section { margin-bottom: 36px; }
    .seo-content h2 { font-size: clamp(20px, 5vw, 26px); font-weight: 800; color: #0f172a; margin: 0 0 14px; letter-spacing: -0.02em; }
    .seo-content p { font-size: 15px; line-height: 1.75; color: #475569; margin: 0 0 14px; font-weight: 500; }
    .seo-content a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .seo-content a:hover { text-decoration: underline; }

    .campus-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 24px 0; }
    @media (min-width: 640px) { .campus-grid { grid-template-columns: 1fr 1fr; } }
    .campus-card { background: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.9); border-radius: 20px; padding: 18px 20px; text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 8px 24px rgba(15,23,42,0.04); }
    .campus-card:hover { transform: translateY(-3px); box-shadow: 0 16px 32px rgba(15,23,42,0.08); }
    .campus-card h3 { font-size: 15px; font-weight: 800; color: #0f172a; margin: 0 0 4px; }
    .campus-card p { font-size: 13px; color: #64748b; margin: 0; }

    .feature-pills { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
    .feature-pill { background: white; border: 1px solid #e2e8f0; padding: 10px 16px; border-radius: 100px; font-size: 13px; font-weight: 700; color: #334155; text-decoration: none; }
    .feature-pill:hover { border-color: #2563eb; color: #2563eb; }

    .seo-faq { margin-top: 48px; padding-top: 32px; border-top: 1px solid #e2e8f0; }
    .seo-faq h2 { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 24px; color: #0f172a; }
    .faq-list { display: flex; flex-direction: column; gap: 10px; }
    .faq-item { background: rgba(255,255,255,0.8); border: 1px solid #e2e8f0; border-radius: 16px; padding: 4px 18px; }
    .faq-item summary { cursor: pointer; font-weight: 700; font-size: 14px; color: #0f172a; padding: 14px 0; list-style: none; }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-item p { font-size: 14px; line-height: 1.65; color: #475569; margin: 0 0 14px; }

    .seo-related { margin-top: 40px; }
    .seo-related h2 { text-align: center; font-size: 22px; font-weight: 800; margin-bottom: 20px; }
    .related-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 640px) { .related-grid { grid-template-columns: 1fr 1fr; } }
    .related-card { background: rgba(255,255,255,0.75); border-radius: 20px; padding: 20px; text-decoration: none; color: inherit; border: 1px solid #e2e8f0; transition: transform 0.2s; }
    .related-card:hover { transform: translateY(-2px); border-color: #2563eb; }
    .related-card h3 { font-size: 16px; font-weight: 800; color: #2563eb; margin: 0 0 6px; }
    .related-card p { font-size: 13px; color: #64748b; margin: 0; line-height: 1.5; }

    .dynamic-feed { margin: 28px 0; }
    .dynamic-feed h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: #0f172a; }
    .feed-list { list-style: none; padding: 0; margin: 0; }
    .feed-list li { background: rgba(255,255,255,0.7); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
    .feed-list a { color: #2563eb; font-weight: 600; text-decoration: none; font-size: 14px; }
    .feed-empty { font-size: 14px; color: #94a3b8; font-style: italic; }

    .reveal { opacity: 0; transform: translateY(20px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }

    .founder-card { background: rgba(255,255,255,0.8); border-radius: 28px; padding: 32px 24px; border: 1px solid #e2e8f0; text-align: center; margin-bottom: 32px; }
    .founder-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #2563eb, #ec4899); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 32px; color: white; font-weight: 800; }
    .founder-meta { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
    .founder-meta span { background: #f1f5f9; padding: 8px 14px; border-radius: 100px; font-size: 13px; font-weight: 600; color: #475569; }
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) { entry.target.classList.add('active'); obs.unobserve(entry.target); }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
});
</script>
