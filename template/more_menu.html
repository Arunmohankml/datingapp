{% extends 'base.html' %}
{% load static %}

{% block title %}More | SRM Match{% endblock %}

{% block head %}
<style>
    .more-container {
        padding: 24px 20px;
        max-width: 600px;
        margin: 0 auto;
    }
    .more-header {
        margin-bottom: 32px;
    }
    .more-header h1 {
        font-size: 28px;
        font-weight: 800;
        color: var(--text-main);
        margin: 0;
    }

    .more-menu-list {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border);
    }

    .more-menu-item {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        color: var(--text-main);
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        border-bottom: 1px solid var(--border);
        background: white;
        transition: 0.2s;
    }
    .more-menu-item:last-child {
        border-bottom: none;
    }
    .more-menu-item:active {
        background: #f8fafc;
    }
    .more-menu-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 16px;
        font-size: 16px;
    }
    .more-menu-item.wall .more-menu-icon { background: rgba(99, 102, 241, 0.1); color: #6366f1; }
    
    .more-menu-arrow {
        margin-left: auto;
        color: var(--text-muted);
        opacity: 0.5;
    }
</style>
{% endblock %}

{% block body %}
<div class="more-container">
    <div class="more-header">
        <h1>More</h1>
    </div>

    <div class="more-menu-list">
        <a href="{% url 'wall' %}" class="more-menu-item wall">
            <div class="more-menu-icon"><i class="fas fa-border-all"></i></div>
            <span>Wall</span>
            <i class="fas fa-chevron-right more-menu-arrow"></i>
        </a>
    </div>
</div>
{% endblock %}
