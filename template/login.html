{% extends 'base.html' %}

{% block head %}
<style>
    .login-header {
        text-align: center;
        margin-bottom: 32px;
    }
    .login-header h2 {
        font-size: 24px;
        color: var(--text-main);
        margin-bottom: 8px;
    }
    .btn-google {
        width: 100%;
        background-color: #ffffff;
        color: var(--text-main);
        border: 1px solid var(--border);
        padding: 12px;
        font-size: 15px;
        font-weight: 500;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        box-shadow: var(--shadow-sm);
    }
    .btn-google:hover {
        background-color: #f9fafb;
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }
    .btn-google img {
        width: 18px;
        height: 18px;
    }
    .error-banner {
        background-color: #fef2f2;
        color: #b91c1c;
        padding: 12px;
        border-radius: var(--radius-md);
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
        border: 1px solid #fecaca;
    }
</style>
{% endblock %}

{% block body %}
<div class="card">
    <div class="login-header">
        <h2>Welcome to SRM Match</h2>
        <p>Sign in to discover your perfect match.</p>
    </div>
    
    <div id="error-message" class="error-banner"></div>

    
    <button class="btn btn-google" id="google-login-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with SRM Google
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNiJROEM1-oa2kidoUorjFPS4FvP_et0M",
      authDomain: "datingapp-636fa.firebaseapp.com",
      projectId: "datingapp-636fa",
      storageBucket: "datingapp-636fa.firebasestorage.app",
      messagingSenderId: "848138254029",
      appId: "1:848138254029:web:db606ec479cc1220805b84",
      measurementId: "G-VVG7199H45"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({
        prompt: 'select_account'
    });

    const errorEl = document.getElementById('error-message');

    async function handleLogin() {
        errorEl.style.display = 'none';
        
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            const idToken = await user.getIdToken();
            
            errorEl.innerText = "Authenticating with backend...";
            errorEl.style.display = "block";
            errorEl.style.backgroundColor = "#eff6ff";
            errorEl.style.color = "#1d4ed8";
            errorEl.style.borderColor = "#bfdbfe";

            const response = await fetch('/api/verify-token/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: idToken })
            });
            
            const data = await response.json();
            if (data.success) {
                window.location.href = '/complete_profile/';
            } else {
                throw new Error(data.error || "Backend authentication failed.");
            }
        } catch (error) {
            console.error(error);
            errorEl.innerText = "Authentication Error: " + error.message;
            errorEl.style.display = "block";
            errorEl.style.backgroundColor = "#fef2f2";
            errorEl.style.color = "#b91c1c";
            errorEl.style.borderColor = "#fecaca";
            
            if (error.code === 'auth/unauthorized-domain') {
                errorEl.innerHTML += "<br><strong>Fix:</strong> Add your domain to Firebase console.";
            }
        }
    }

    document.getElementById('google-login-btn').addEventListener('click', handleLogin);
</script>
{% endblock %}
