<style id="knots-styles">
    :root {
        --knot-primary: #2563eb;
        --knot-primary-strong: #1d4ed8;
        --knot-primary-soft: #eff6ff;
        --knot-text: #172033;
        --knot-muted: #667085;
        --knot-border: #e4e9f2;
        --knot-surface: #ffffff;
        --knot-bg: #f5f7fb;
        --knot-danger: #dc2626;
        --knot-shadow: 0 12px 34px rgba(15, 23, 42, .09);
        --knot-shadow-soft: 0 5px 16px rgba(15, 23, 42, .08);
        --knot-shadow-raised: 0 18px 46px rgba(15, 23, 42, .16);
    }

    body { background: var(--knot-bg); }
    html,
    body,
    .container,
    .knots-shell,
    .knots-detail-shell,
    .knots-body,
    .filter-sheet,
    .filter-panel,
    .knot-composer-shell,
    .knot-composer,
    .knot-composer-main,
    .knot-options-menu,
    .knot-rich-editor {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    .container::-webkit-scrollbar,
    .knots-shell::-webkit-scrollbar,
    .knots-detail-shell::-webkit-scrollbar,
    .knots-body::-webkit-scrollbar,
    .filter-sheet::-webkit-scrollbar,
    .filter-panel::-webkit-scrollbar,
    .knot-composer-shell::-webkit-scrollbar,
    .knot-composer::-webkit-scrollbar,
    .knot-composer-main::-webkit-scrollbar,
    .knot-options-menu::-webkit-scrollbar,
    .knot-rich-editor::-webkit-scrollbar {
        display: none;
    }
    .container {
        width: 100%;
        max-width: 560px;
        min-height: 100dvh;
        margin: 0 auto;
        padding: 0 0 112px;
        background: var(--knot-bg);
        box-sizing: border-box;
    }
    .sr-only {
        position: absolute !important;
        width: 1px; height: 1px;
        padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0);
        white-space: nowrap; border: 0;
    }
    [hidden] { display: none !important; }
    .knots-shell, .knots-detail-shell {
        width: 100%;
        min-height: calc(100dvh - 112px);
        color: var(--knot-text);
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-sizing: border-box;
    }

    .knots-header {
        position: sticky;
        top: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 72px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, .94);
        border-bottom: 0;
        box-shadow: 0 5px 20px rgba(15, 23, 42, .07);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-sizing: border-box;
    }
    .knots-header-main {
        display: flex;
        align-items: center;
        gap: 11px;
        min-width: 0;
    }
    .knots-header h1, .knots-header h2 {
        margin: 0;
        color: var(--knot-text);
        font-size: 21px;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: -.025em;
    }
    .knots-header-sub {
        max-width: 350px;
        margin: 3px 0 0;
        color: var(--knot-muted);
        font-size: 11.5px;
        line-height: 1.35;
        font-weight: 500;
    }
    .knots-back-btn, .knot-icon-btn, .sheet-close-btn {
        display: inline-flex;
        flex: 0 0 44px;
        width: 44px;
        height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 0;
        border-radius: 17px;
        background: #fff;
        box-shadow: var(--knot-shadow-soft);
        color: #344054;
        text-decoration: none;
        cursor: pointer;
        box-sizing: border-box;
        transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .knots-header-icon {
        display: inline-flex;
        flex: 0 0 44px;
        width: 44px;
        height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 17px;
        background: var(--knot-primary-soft);
        color: var(--knot-primary);
        box-shadow: var(--knot-shadow-soft);
        box-sizing: border-box;
    }
    .knots-back-btn .material-symbols-outlined { font-size: 21px; }
    .knots-header-icon .material-symbols-outlined {
        font-size: 25px;
        font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24;
    }
    .knots-back-btn:active, .knot-icon-btn:active, .sheet-close-btn:active { transform: scale(.96); }
    .knots-header-badge {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-width: 31px;
        height: 28px;
        padding: 0 9px;
        border-radius: 999px;
        background: var(--knot-primary-soft);
        color: var(--knot-primary-strong);
        font-size: 12px;
        font-weight: 800;
        box-sizing: border-box;
    }

    .knots-body { width: 100%; box-sizing: border-box; }
    .knots-body-inner { padding: 0 12px 20px; box-sizing: border-box; }
    .knots-detail-shell .knots-body-inner { padding-right: 0; padding-left: 0; }
    #knotFilterForm { margin: 0; }
    .knots-toolbar {
        position: relative;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px;
        background: var(--knot-bg);
        box-sizing: border-box;
    }
    .knots-search-wrap {
        position: relative;
        display: flex;
        flex: 1 1 auto;
        min-width: 0;
        align-items: center;
    }
    .knots-search-wrap > .material-symbols-outlined {
        position: absolute;
        left: 12px;
        z-index: 1;
        color: #98a2b3;
        font-size: 19px;
        pointer-events: none;
    }
    .knots-search-wrap input[type="search"] {
        width: 100%;
        height: 44px;
        min-width: 0;
        margin: 0;
        padding: 0 38px;
        border: 0;
        border-radius: 17px;
        outline: 0;
        background: #fff;
        color: var(--knot-text);
        font: 600 14px/1 'Plus Jakarta Sans', sans-serif;
        box-shadow: var(--knot-shadow-soft);
        box-sizing: border-box;
        appearance: none;
    }
    .knots-search-wrap input[type="search"]:focus {
        border-color: #7aa7fa;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    .knots-search-clear {
        position: absolute;
        right: 5px;
        display: inline-flex;
        width: 34px;
        height: 34px;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: #667085;
        cursor: pointer;
    }
    .knots-search-clear .material-symbols-outlined { font-size: 18px; }
    .knots-compact-btn {
        display: inline-flex;
        flex: 0 0 auto;
        height: 44px;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 0 10px;
        border: 0;
        border-radius: 16px;
        background: #fff;
        box-shadow: var(--knot-shadow-soft);
        color: #344054;
        font: 700 12px/1 'Plus Jakarta Sans', sans-serif;
        white-space: nowrap;
        cursor: pointer;
        box-sizing: border-box;
        list-style: none;
        user-select: none;
    }
    .knots-compact-btn::-webkit-details-marker { display: none; }
    .knots-compact-btn .material-symbols-outlined { font-size: 17px; }
    .knots-sort-menu { position: relative; flex: 0 0 auto; }
    .knots-sort-menu[open] > .knots-compact-btn {
        background: var(--knot-primary-soft);
        color: var(--knot-primary-strong);
        box-shadow: 0 7px 20px rgba(37, 99, 235, .14);
    }
    .knots-sort-menu[open] > .knots-compact-btn .material-symbols-outlined { transform: rotate(180deg); }
    .knots-sort-dropdown {
        position: absolute;
        top: calc(100% + 7px);
        right: 0;
        z-index: 80;
        width: 142px;
        padding: 6px;
        border: 0;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 16px 36px rgba(15, 23, 42, .16);
        box-sizing: border-box;
    }
    .knots-sort-btn {
        display: flex;
        width: 100%;
        min-height: 40px;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
        border: 0;
        border-radius: 9px;
        background: transparent;
        color: #475467;
        font: 650 13px/1 'Plus Jakarta Sans', sans-serif;
        cursor: pointer;
    }
    .knots-sort-btn:hover, .knots-sort-btn.active { background: var(--knot-primary-soft); color: var(--knot-primary-strong); }
    .knots-sort-btn .material-symbols-outlined { font-size: 17px; }
    .knots-filter-btn { position: relative; min-width: 58px; }
    .filter-count {
        display: inline-flex;
        min-width: 18px;
        height: 18px;
        align-items: center;
        justify-content: center;
        padding: 0 5px;
        border-radius: 999px;
        background: var(--knot-primary);
        color: #fff;
        font-size: 10px;
        box-sizing: border-box;
    }

    .filter-chips {
        display: flex;
        gap: 7px;
        overflow-x: auto;
        padding: 0 12px 10px;
        scrollbar-width: none;
    }
    .filter-chips::-webkit-scrollbar { display: none; }
    .filter-chip, .knot-category, .knot-campus-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-height: 25px;
        padding: 0 9px;
        border-radius: 999px;
        background: var(--knot-primary-soft);
        color: var(--knot-primary-strong);
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: .02em;
        white-space: nowrap;
        box-sizing: border-box;
    }
    .filter-chip button {
        display: inline-flex;
        width: 24px; height: 24px;
        align-items: center; justify-content: center;
        margin-right: -7px;
        padding: 0; border: 0;
        background: transparent; color: inherit;
        cursor: pointer;
    }
    .filter-chip button .material-symbols-outlined { font-size: 15px; }
    .knot-category { background: #f2f4f7; color: #475467; }

    .knot-feed { display: grid; gap: 10px; }
    .knot-card {
        position: relative;
        padding: 14px;
        border: 0;
        border-radius: 24px;
        background: var(--knot-surface);
        box-shadow: var(--knot-shadow);
        box-sizing: border-box;
    }
    .knot-card-link { display: block; color: inherit; text-decoration: none; }
    .knot-author { display: flex; align-items: center; gap: 10px; min-width: 0; padding-right: 36px; }
    .knot-avatar {
        flex: 0 0 auto;
        width: 38px; height: 38px;
        border-radius: 50%;
        object-fit: cover;
        background: #eef2f6;
    }
    .knot-author-copy { min-width: 0; }
    .knot-admin-email {
        max-width: 210px;
        margin-top: 1px;
        overflow: hidden;
        color: #b42318;
        font-size: 11px;
        font-weight: 800;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .knot-profile-link { color: inherit; text-decoration: none; }
    .knot-avatar-link { display: inline-flex; flex: 0 0 auto; border-radius: 999px; }
    .knot-profile-click { cursor: pointer; }
    .comment[data-profile-url] .knot-avatar,
    .comment[data-profile-url] .knot-author-name { cursor: pointer; }
    .knot-profile-link:hover .knot-avatar,
    .knot-avatar.knot-profile-click:hover { filter: brightness(.96); }
    .knot-profile-link:focus-visible,
    .knot-profile-click:focus-visible {
        outline: 2px solid rgba(37, 99, 235, .28);
        outline-offset: 3px;
        border-radius: 999px;
    }
    .knot-author-name {
        overflow: hidden;
        color: #263244;
        font-size: 14px;
        font-weight: 750;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .knot-meta { margin-top: 2px; color: #7c8798; font-size: 11.5px; line-height: 1.35; font-weight: 600; }
    .knot-chips-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 11px 0 8px; }
    .knot-author > .knot-chips-row {
        flex: 0 1 auto;
        max-width: 52%;
        flex-wrap: nowrap;
        justify-content: flex-end;
        gap: 4px;
        margin: 0 0 0 auto;
        overflow: hidden;
    }
    .knot-author > .knot-chips-row > span { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .knot-card h2 {
        margin: 9px 0 7px;
        color: #172033;
        font-size: 18.5px;
        line-height: 1.35;
        font-weight: 800;
        letter-spacing: -.018em;
        overflow-wrap: anywhere;
        word-break: break-word;
    }
    .knot-content {
        display: -webkit-box;
        overflow: hidden;
        margin: 0;
        color: #344054;
        font-size: 14.5px;
        line-height: 1.62;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
    }
    .knot-list-excerpt {
        text-overflow: ellipsis;
    }
    .knot-card-detail .knot-content { display: block; overflow: visible; -webkit-line-clamp: unset; }
    .knot-link {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        margin-top: 11px;
        padding: 9px 10px;
        border-radius: 15px;
        background: #f8fafc;
        color: var(--knot-primary-strong);
        font-size: 12.5px;
        font-weight: 650;
        text-decoration: none;
    }
    .knot-link .material-symbols-outlined { flex: 0 0 auto; font-size: 17px; }
    .knot-link span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .knot-menu-wrap { position: absolute; top: 11px; right: 10px; z-index: 12; }
    .knot-menu-btn {
        display: inline-flex;
        width: 38px; height: 38px;
        align-items: center; justify-content: center;
        padding: 0; border: 0; border-radius: 12px;
        background: transparent; color: #667085;
        cursor: pointer;
    }
    .knot-menu-btn .material-symbols-outlined { font-size: 21px; }
    .knot-menu {
        position: absolute;
        top: 40px; right: 0;
        display: none;
        width: 158px;
        padding: 6px;
        border: 0;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 16px 38px rgba(15, 23, 42, .18);
    }
    .knot-menu.open-up {
        top: auto;
        bottom: 40px;
    }
    .knot-menu.open { display: block; }
    .knot-menu a, .knot-menu button {
        display: flex;
        width: 100%; min-height: 40px;
        align-items: center; gap: 8px;
        padding: 0 10px;
        border: 0; border-radius: 9px;
        background: transparent; color: #344054;
        font: 650 12.5px/1 'Plus Jakarta Sans', sans-serif;
        text-decoration: none; cursor: pointer;
        box-sizing: border-box;
    }
    .knot-menu a:hover, .knot-menu button:hover { background: #f8fafc; }
    .knot-menu .material-symbols-outlined { font-size: 17px; }
    .knot-menu .danger { color: var(--knot-danger); }
    .knot-actions, .comment-actions { display: flex; align-items: center; gap: 7px; margin-top: 12px; }
    .knot-action {
        display: inline-flex;
        min-width: 44px; height: 36px;
        align-items: center; justify-content: center; gap: 4px;
        padding: 0 10px;
        border: 1px solid #edf0f5;
        border-radius: 11px;
        background: #f8fafc;
        box-shadow: none;
        color: #667085;
        font: 700 12px/1 'Plus Jakarta Sans', sans-serif;
        text-decoration: none; cursor: pointer;
        box-sizing: border-box;
    }
    .knot-action .material-symbols-outlined { font-size: 17px; }
    .knot-action:hover,
    .knot-action:focus-visible { border-color: #dfe5ed; background: #f8fafc; box-shadow: none; }
    .knot-action.active { border-color: #bfdbfe; background: var(--knot-primary-soft); color: var(--knot-primary-strong); box-shadow: none; }
    .knot-action.share { margin-left: auto; }

    .knots-fab {
        position: fixed;
        right: max(18px, calc((100vw - 560px) / 2 + 18px));
        bottom: calc(92px + env(safe-area-inset-bottom, 0px));
        z-index: 45;
        display: flex;
        width: 52px; height: 52px;
        align-items: center; justify-content: center;
        border-radius: 20px;
        background: var(--knot-primary);
        color: #fff;
        text-decoration: none;
        box-shadow: 0 12px 28px rgba(37, 99, 235, .32);
    }
    .knots-fab:active { transform: scale(.96); }

    .knot-sheet-scrim {
        position: fixed;
        inset: 0;
        z-index: 3000;
        display: none;
        align-items: flex-end;
        justify-content: center;
        padding: 0;
        background: rgba(15, 23, 42, .48);
    }
    .knot-sheet-scrim.open { display: flex; }
    .knot-rules-overlay {
        position: fixed;
        inset: 0;
        z-index: 4200;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(15, 23, 42, .58);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }
    .knot-rules-overlay.open { display: flex; }
    .knot-login-overlay {
        position: fixed;
        inset: 0;
        z-index: 4300;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(15, 23, 42, .55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }
    .knot-login-overlay.open { display: flex; }
    .knot-login-dialog {
        position: relative;
        width: min(100%, 390px);
        padding: 24px 20px 20px;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 30px 80px rgba(15, 23, 42, .28);
        box-sizing: border-box;
        text-align: center;
        animation: knotRulesPop .22s ease both;
    }
    .knot-login-close { position: absolute; top: 12px; right: 12px; }
    .knot-login-icon {
        display: inline-flex;
        width: 54px;
        height: 54px;
        align-items: center;
        justify-content: center;
        margin-bottom: 13px;
        border-radius: 20px;
        background: #eef4ff;
        color: var(--knot-primary);
    }
    .knot-login-icon .material-symbols-outlined { font-size: 29px; }
    .knot-login-dialog h2 { margin: 0 28px 8px; color: #172033; font-size: 21px; font-weight: 900; letter-spacing: -.03em; }
    .knot-login-dialog p { margin: 0 0 18px; color: #667085; font-size: 13px; font-weight: 650; line-height: 1.5; }
    .knot-login-actions { display: grid; gap: 10px; }
    .knot-rules-dialog {
        width: min(100%, 420px);
        padding: 22px;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 30px 80px rgba(15, 23, 42, .28);
        box-sizing: border-box;
        animation: knotRulesPop .22s ease both;
    }
    @keyframes knotRulesPop {
        from { opacity: 0; transform: translateY(12px) scale(.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .knot-rules-icon {
        display: inline-flex;
        width: 46px;
        height: 46px;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        background: #eef4ff;
        color: var(--knot-primary);
        margin-bottom: 12px;
    }
    .knot-rules-icon .material-symbols-outlined { font-size: 25px; }
    .knot-rules-dialog h2 {
        margin: 0 0 6px;
        color: #172033;
        font-size: 21px;
        font-weight: 900;
        letter-spacing: -.03em;
    }
    .knot-rules-dialog p {
        margin: 0 0 13px;
        color: #667085;
        font-size: 13px;
        font-weight: 650;
        line-height: 1.5;
    }
    .knot-rules-dialog ul {
        display: grid;
        gap: 9px;
        margin: 0 0 18px;
        padding-left: 18px;
        color: #344054;
        font-size: 13px;
        font-weight: 650;
        line-height: 1.48;
    }
    .knot-rules-dialog .knot-primary-btn { width: 100%; }
    .sticky-login-cta { padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px)); }
    .sticky-login-cta button {
        display: flex;
        width: 100%;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 0;
        border-radius: 999px;
        background: #fff;
        color: var(--knot-primary);
        box-shadow: var(--knot-shadow-soft);
        font: 800 13px/1 'Plus Jakarta Sans', sans-serif;
        cursor: pointer;
    }
    .sticky-login-cta .material-symbols-outlined { font-size: 18px; }
    .knot-sheet {
        width: min(100%, 560px);
        max-height: min(78dvh, 680px);
        overflow-y: auto;
        padding: 9px 18px calc(18px + env(safe-area-inset-bottom, 0px));
        border-radius: 24px 24px 0 0;
        background: #fff;
        box-shadow: 0 -20px 50px rgba(15, 23, 42, .18);
        box-sizing: border-box;
    }
    .sheet-handle { width: 38px; height: 4px; margin: 0 auto 10px; border-radius: 999px; background: #d0d5dd; }
    .sheet-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .sheet-header h2 { margin: 0; font-size: 19px; font-weight: 800; }
    .sheet-close-btn { flex-basis: 40px; width: 40px; height: 40px; }
    .filter-group { padding: 12px 0; border-top: 0; }
    .filter-check { display: flex; min-height: 40px; align-items: center; gap: 10px; color: #344054; font-size: 13px; cursor: pointer; }
    .filter-check input { width: 18px; height: 18px; margin: 0; accent-color: var(--knot-primary); }
