<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}SRM Match{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a; /* Deep Sleek Navy */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #8b5cf6; /* Modern Violet */
            --primary-hover: #7c3aed;
            --accent: #f43f5e; /* Rose */
            --surface: rgba(30, 41, 59, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            --radius-md: 12px;
            --radius-lg: 24px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Better for scrolling */
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            margin-top: 80px; /* Space for nav */
            box-sizing: border-box;
        }

        /* Allow specific pages to override max-width if they explicitly ask */
        .container.full-width {
            max-width: 1100px;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 24px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }

        h1, h2, h3, h4 {
            margin-top: 0;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
            filter: brightness(1.1);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            padding: 15px;
            pointer-events: none;
        }

        .nav-inner {
            pointer-events: auto;
            display: flex;
            gap: 24px;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--glass-border);
        }
        
        .logout-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .logout-link:hover {
            color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
            transform: scale(1.1);
        }

        .logout-link.active {
            color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
        }

        /* Forms Premium Styling */
        input[type="text"], input[type="number"], input[type="file"], select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-family: inherit;
            font-size: 15px;
            margin-bottom: 16px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    </style>
    {% block head %}{% endblock %}
</head>

<body>
    {% if user.is_authenticated %}
    <nav>
        <div class="nav-inner">
            <a href="{% url 'home' %}" class="logout-link" title="Discover"><i class="fas fa-fire"></i></a>
            <a href="{% url 'connections' %}" class="logout-link" title="Matches"><i class="fas fa-bolt"></i></a>
            <a href="{% url 'chat_list' %}" class="logout-link" title="Messages"><i class="fas fa-comment-dots"></i></a>
            <a href="{% url 'edit_profile' %}" class="logout-link" title="My Profile"><i class="fas fa-user"></i></a>
            <a href="/logout" class="logout-link" style="color: var(--accent);" title="Logout"><i class="fas fa-power-off"></i></a>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% block body %}{% endblock %}
    </div>
</body>
</html>
