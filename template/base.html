<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}SRM Match{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f7f9fc;
            --text-main: #111827;
            --text-muted: #6b7280;
            --primary: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --surface: #ffffff;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 8px;
            --radius-lg: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 32px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        h1, h2, h3, h4 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-muted);
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        nav {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .logout-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .logout-link:hover {
            color: var(--text-main);
        }

        /* Forms */
        input[type="text"], input[type="number"], input[type="file"], select, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            margin-bottom: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
        }

    </style>
    {% block head %}{% endblock %}
</head>

<body>
    {% if user.is_authenticated %}
    <nav style="display: flex; gap: 20px; align-items: center; position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8); padding: 8px 16px; border-radius: 20px; box-shadow: var(--shadow-sm); backdrop-filter: blur(10px);">
        <a href="{% url 'home' %}" class="logout-link" title="Home"><i class="fas fa-home"></i></a>
        <a href="{% url 'connections' %}" class="logout-link"><i class="fas fa-heart"></i> Matches</a>
        <a href="{% url 'chat_list' %}" class="logout-link"><i class="fas fa-comment"></i> Chats</a>
        <a href="{% url 'edit_profile' %}" class="logout-link" title="Edit Profile"><i class="fas fa-user-circle"></i> Profile</a>
        <a href="/logout" class="logout-link" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i></a>
    </nav>
    {% endif %}

    <div class="container">
        {% block body %}{% endblock %}
    </div>
</body>
</html>
